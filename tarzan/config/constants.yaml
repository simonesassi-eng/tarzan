# =============================================================================
# Tarzan — Configuration
# Edit this file to customize behavior without touching code.
# =============================================================================


# =============================================================================
# 1. RISK & PERFORMANCE
# =============================================================================

# Risk-free rate for Sharpe/Sortino calculations (decimal, e.g. 0.04 = 4%)
risk_free_rate: 0.04


# =============================================================================
# 1b. METRIC RATING THRESHOLDS
# Used by the Dashboard to color-code and label each KPI.
# Format: [good_threshold, warning_threshold]
#   - Values ABOVE good  → green  (positive metrics)
#   - Values BETWEEN     → amber
#   - Values BELOW warn  → red
# For "lower is better" metrics (max_dd, volatility, var, cvar) the logic
# is inverted automatically in code.
# =============================================================================

metric_ratings:
  cagr:
    thresholds: [7.0, 3.0]          # >7% green, 3-7% amber, <3% red (equity risk premium ~5-7%)
    labels: ["Strong", "Fair", "Weak"]
    unit: "%"
  alpha:
    thresholds: [0.0, -1.0]         # >0% green, -1-0% amber, <-1% red (Jensen's Alpha)
    labels: ["Beating Mkt", "Neutral", "Lagging"]
    unit: "%"
  max_drawdown:                      # lower-is-better (absolute value)
    thresholds: [-15.0, -30.0]       # >-15% green, -15/-30% amber, <-30% red
    labels: ["Contained", "Moderate", "Severe"]
    invert: true
    unit: "%"
  volatility:                        # lower-is-better
    thresholds: [10.0, 18.0]        # <10% green, 10-18% amber, >18% red (equity vol ~15%)
    labels: ["Low", "Moderate", "High"]
    invert: true
    unit: "%"
  beta:                              # higher = more market risk
    thresholds: [0.7, 1.0]          # <0.7 green, 0.7-1 amber, >1 red (CAPM)
    labels: ["Defensive", "Neutral", "Aggressive"]
    invert: true
    unit: ""
  sharpe:
    thresholds: [1.0, 0.5]          # >1 green, 0.5-1 amber, <0.5 red (Sharpe 1994)
    labels: ["Strong", "Fair", "Weak"]
    unit: ""
  sortino:
    thresholds: [1.5, 0.7]          # >1.5 green, 0.7-1.5 amber, <0.7 red (Sortino & Price 1994)
    labels: ["Strong", "Fair", "Weak"]
    unit: ""
  var_pct:                           # lower-is-better (% of AuM)
    thresholds: [0.8, 1.5]          # <0.8% green, 0.8-1.5% amber, >1.5% red (Basel III adj)
    labels: ["Low", "Moderate", "Elevated"]
    invert: true
    unit: "%"
  cvar_pct:                          # lower-is-better (% of AuM)
    thresholds: [1.2, 2.0]          # <1.2% green, 1.2-2% amber, >2% red (Artzner 1999)
    labels: ["Low", "Moderate", "Elevated"]
    invert: true
    unit: "%"


# =============================================================================
# 2. DATA FETCHING
# =============================================================================

cache_ttl_hours: 0.083            # Cache expiry (~5 minutes)
max_workers: 8                    # Parallel threads for yfinance API calls


# =============================================================================
# 3. DEFAULT ALLOCATION TARGETS
# Used when targets.csv doesn't specify values.
# invested_allocation targets apply to the invested portion (excluding cash).
# equity_geo targets apply to the equity portion of the invested allocation.
# =============================================================================

default_invested_allocation_targets_pctg:
  Equities: 65.0
  Fixed Income: 25.0
  Gold: 5.0
  Commodities: 0.0
  Alternative: 5.0

default_equity_geo_targets_pctg:
  USA: 50.0
  Japan: 9.0
  Eurozone EMU: 16.0
  Dev ex-USA ex-EMU ex-JP: 13.0
  Emerging Markets: 12.0



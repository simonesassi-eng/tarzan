# =============================================================================
# 5. CLASSIFICATION KEYWORDS
# Used by the enrichment pipeline to classify holdings.
# =============================================================================

classification:
  # Asset type hints (from input CSV column)
  asset_type_equities: ["equity", "stock", "azionario", "azione", "share"]
  asset_type_fixed_income: ["bond", "obbligaz", "fixed", "btp", "treasury", "govt"]
  asset_type_cash: ["money", "monetar", "cash", "t-bill", "certificate"]
  asset_type_gold: ["gold", "oro"]
  asset_type_commodities: ["silver", "precious", "metall", "argento", "commodity", "commodities"]
  asset_type_alternative: ["etn", "alternative", "crypto"]
  # Name-based classification
  name_fixed_income: ["bond", "btp", "treasury", "government bond", "obbligaz", "aggregate bond", "fixed income"]
  name_cash: ["money market", "estr", "€str", "ester", "overnight", "cash", "liquidity", "t-bill"]
  name_gold: ["gold", "oro"]
  name_commodities: ["silver", "precious", "palladium", "platinum", "commodity"]
  name_equity_etf: ["msci", "s&p", "stoxx", "ftse", "russell", "nasdaq", "world", "emerging", "japan", "europe", "usa", "quality", "momentum", "value", "dividend"]
  # Instrument type inference
  instrument_bond_etf: ["bond", "fixed income", "treasury", "government", "aggregate bond"]
  instrument_money_market: ["money market", "estr", "€str", "ester", "overnight", "cash"]
  instrument_gold_etc: ["gold", "oro"]
  instrument_commodities_etf: ["precious metal", "silver", "commodit"]
  # Note: instrument_precious_etc labels generic "Precious Metals ETC" (non-gold metals).
  # Gold is handled separately via instrument_gold_etc to preserve the Gold / Commodities split.
  instrument_precious_etc: ["silver", "precious", "palladium", "platinum"]
  instrument_equity_category: ["equity", "stock", "large", "small", "mid", "growth", "value", "blend"]
  # OpenFIGI security type mappings
  figi_fixed_income: ["govt", "sovereign", "corp", "corporate bond", "note", "medium-term note"]
  figi_equity: ["common stock", "depositary receipt"]
  figi_etf: ["etp", "etf", "open-end fund"]

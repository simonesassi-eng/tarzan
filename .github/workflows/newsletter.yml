# Tarzan — portfolio newsletter automation
#
# Scheduled sends, all in Italian local time:
#   Mon–Fri  09:13  morning
#   Mon–Fri  13:17  midday
#   Mon–Fri  17:23  close
#   Sat–Sun  09:13  morning  (weekend: only one send per day)
#
# Slot times are deliberately "off-the-hour" because GitHub Actions
# scheduled runs are noticeably delayed (or sometimes silently
# skipped) when triggered at minute 0 of the hour, which is the
# busiest dispatch window for the whole platform.
#
# GitHub Actions cron is UTC-only and does not follow DST. We declare
# two parallel sets of cron expressions (CET=UTC+1 in winter and
# CEST=UTC+2 in summer) so a slot fires at the same Italian local time
# year-round. The first job step then guards against the wrong-season
# half by checking the actual local time at execution rather than
# trusting which cron fired.
#
# In addition:
#   * workflow_dispatch  — manual trigger from the Actions UI.
#   * repository_dispatch (event_type: send_now)
#       — triggered by the Gmail Apps Script when you reply "Update" to
#       a previous newsletter, for an on-demand send.

name: Tarzan Newsletter

on:
  schedule:
    # ── WINTER (CET = UTC+1) ────────────────────────────────────────────
    - cron: "13 8 * * *"   # 09:13 CET
    - cron: "17 12 * * *"  # 13:17 CET
    - cron: "23 16 * * *"  # 17:23 CET
    # ── SUMMER (CEST = UTC+2) ───────────────────────────────────────────
    - cron: "13 7 * * *"   # 09:13 CEST
    - cron: "17 11 * * *"  # 13:17 CEST
    - cron: "23 15 * * *"  # 17:23 CEST
  workflow_dispatch:
    inputs:
      trigger_label:
        description: "Label for this run (shown in the email subject)"
        default: "manual"
        required: false
  repository_dispatch:
    types: [send_now]

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read

    env:
      # Email + SMTP — set these in repo Settings > Secrets and variables > Actions
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      # Inputs from Google Drive (preferred for public repos).
      # The service-account JSON must be the entire key, single-line,
      # with newlines escaped as \n.
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
      SUBJECT_PREFIX: "Tarzan Portfolio Digest"
      # Issue counter — increments every send via $GITHUB_RUN_NUMBER
      ISSUE_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Decide whether this scheduled run should actually proceed, and
      # pick a friendly slot label.
      #
      # Strategy: identify the *intended* slot by the cron expression
      # GitHub passes in ``github.event.schedule`` rather than by the
      # wall-clock time when the runner actually starts. GitHub's
      # scheduled-trigger dispatcher is heavily backlogged at peak
      # hours and routinely fires runs hours late, so a ±20 min
      # window guard against the runner clock skips most of them.
      # The cron expression is the reliable signal because it is
      # baked into the workflow definition and travels with the
      # event payload regardless of dispatch lag.
      #
      # Slots:
      #   morning  09:13 (CET 13 8 / CEST 13 7) — sent every day
      #   midday   13:17 (CET 17 12 / CEST 17 11) — weekdays only
      #   close    17:23 (CET 23 16 / CEST 23 15) — weekdays only
      #
      # workflow_dispatch and repository_dispatch always run.
      - name: Resolve trigger label and time-window guard
        id: trigger
        env:
          GH_EVENT: ${{ github.event_name }}
          GH_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_LABEL: ${{ github.event.inputs.trigger_label }}
          REPO_DISPATCH_LABEL: ${{ github.event.client_payload.label }}
        run: |
          set -euo pipefail
          NOW=$(TZ=Europe/Rome date +'%Y-%m-%d %H:%M %Z (%a)')
          DOW=$(TZ=Europe/Rome date +%u)        # 1=Mon … 7=Sun

          # Map each known cron expression to a slot label. Both
          # winter (CET = UTC+1) and summer (CEST = UTC+2) variants
          # land on the same slot; the active season is whichever
          # cron actually fires on a given day, GitHub takes care of
          # picking one of them based on the runner's UTC clock.
          declare -A CRON_TO_SLOT=(
            ["13 8 * * *"]="morning"   # 09:13 CET
            ["13 7 * * *"]="morning"   # 09:13 CEST
            ["17 12 * * *"]="midday"   # 13:17 CET
            ["17 11 * * *"]="midday"   # 13:17 CEST
            ["23 16 * * *"]="close"    # 17:23 CET
            ["23 15 * * *"]="close"    # 17:23 CEST
          )

          SLOT=""
          if [[ "$GH_EVENT" == "schedule" ]]; then
            if [[ -n "${GH_SCHEDULE:-}" && -n "${CRON_TO_SLOT[${GH_SCHEDULE}]:-}" ]]; then
              SLOT="${CRON_TO_SLOT[${GH_SCHEDULE}]}"
              echo "Cron '${GH_SCHEDULE}' maps to slot: $SLOT"
            else
              # ``github.event.schedule`` is empty in some edge cases
              # (e.g. event.schedule renamed by GitHub in the future).
              # Fall back to the slot whose configured local time is
              # closest to the current runner clock, with no window
              # cap — better to send a slightly off-time newsletter
              # than to skip silently.
              HOUR=$(TZ=Europe/Rome date +%H)
              MIN=$(TZ=Europe/Rome date +%M)
              NOW_MIN=$((10#$HOUR * 60 + 10#$MIN))
              MORNING=$((9 * 60 + 13))
              MIDDAY=$((13 * 60 + 17))
              CLOSE=$((17 * 60 + 23))
              best_slot="morning"; best_diff=$(( NOW_MIN > MORNING ? NOW_MIN - MORNING : MORNING - NOW_MIN ))
              diff=$(( NOW_MIN > MIDDAY ? NOW_MIN - MIDDAY : MIDDAY - NOW_MIN ))
              [[ $diff -lt $best_diff ]] && { best_slot="midday"; best_diff=$diff; }
              diff=$(( NOW_MIN > CLOSE ? NOW_MIN - CLOSE : CLOSE - NOW_MIN ))
              [[ $diff -lt $best_diff ]] && { best_slot="close"; best_diff=$diff; }
              SLOT="$best_slot"
              echo "Empty cron expression — fell back to nearest slot by clock: $SLOT (lag ${best_diff}m)"
            fi
          fi

          # Weekend rule (Saturday=6, Sunday=7): only the morning slot
          # ships. Midday and close are skipped on weekends.
          IS_WEEKEND=0
          if [[ "$DOW" -ge 6 ]]; then
            IS_WEEKEND=1
            if [[ "$SLOT" == "midday" || "$SLOT" == "close" ]]; then
              echo "Weekend ($NOW): skipping $SLOT slot, only morning runs on Sat/Sun."
              SLOT=""
            fi
          fi

          echo "Now: $NOW (DoW=$DOW, weekend=$IS_WEEKEND, slot=${SLOT:-NONE})"

          if [[ "$GH_EVENT" == "schedule" ]]; then
            if [[ -z "$SLOT" ]]; then
              SHOULD_RUN=0
              echo "Skipping: weekend midday/close slot or unknown cron."
            else
              SHOULD_RUN=1
            fi
            LABEL="${SLOT:-scheduled}"
          elif [[ "$GH_EVENT" == "repository_dispatch" ]]; then
            SHOULD_RUN=1
            LABEL="${REPO_DISPATCH_LABEL:-on-demand}"
          else
            SHOULD_RUN=1
            LABEL="${MANUAL_LABEL:-manual}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Will run? $SHOULD_RUN — label: $LABEL"

      - name: Set up Python
        if: steps.trigger.outputs.should_run == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.trigger.outputs.should_run == '1'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render & send newsletter
        if: steps.trigger.outputs.should_run == '1'
        env:
          TRIGGER_LABEL: ${{ steps.trigger.outputs.label }}
        run: python scripts/send_newsletter.py

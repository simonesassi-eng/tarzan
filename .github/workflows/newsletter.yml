# Tarzan — portfolio newsletter automation
#
# Scheduled sends, all in Italian local time:
#   Mon–Fri  09:05  morning
#   Mon–Fri  13:00  midday
#   Mon–Fri  17:30  close
#   Sat–Sun  09:05  morning  (weekend: only one send per day)
#
# GitHub Actions cron is UTC-only and does not follow DST. We declare
# two parallel sets of cron expressions (CET=UTC+1 in winter and
# CEST=UTC+2 in summer) so a slot fires at the same Italian local time
# year-round. The first job step then guards against the wrong-season
# half by checking the actual local time at execution rather than
# trusting which cron fired.
#
# In addition:
#   * workflow_dispatch  — manual trigger from the Actions UI.
#   * repository_dispatch (event_type: send_now)
#       — triggered by the Gmail Apps Script when you reply "Update" to
#       a previous newsletter, for an on-demand send.

name: Tarzan Newsletter

on:
  schedule:
    # ── WINTER (CET = UTC+1) ────────────────────────────────────────────
    - cron: "5 8 * * *"    # 09:05 CET
    - cron: "0 12 * * *"   # 13:00 CET
    - cron: "30 16 * * *"  # 17:30 CET
    # ── SUMMER (CEST = UTC+2) ───────────────────────────────────────────
    - cron: "5 7 * * *"    # 09:05 CEST
    - cron: "0 11 * * *"   # 13:00 CEST
    - cron: "30 15 * * *"  # 17:30 CEST
  workflow_dispatch:
    inputs:
      trigger_label:
        description: "Label for this run (shown in the email subject)"
        default: "manual"
        required: false
  repository_dispatch:
    types: [send_now]

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read

    env:
      # Email + SMTP — set these in repo Settings > Secrets and variables > Actions
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      # Inputs from Google Drive (preferred for public repos).
      # The service-account JSON must be the entire key, single-line,
      # with newlines escaped as \n.
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
      SUBJECT_PREFIX: "Tarzan Portfolio Digest"
      # Issue counter — increments every send via $GITHUB_RUN_NUMBER
      ISSUE_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Decide whether this scheduled run should actually proceed, and
      # pick a friendly slot label. We do NOT rely on
      # ``github.event.schedule`` because it is unreliable. Instead we
      # look at the *local Italian time at which the runner started*
      # and accept the run only if it falls inside one of the configured
      # slots (±20 min tolerance to absorb GitHub's cron jitter).
      #
      # Slots:
      #   morning  09:05 — sent every day
      #   midday   13:00 — weekdays only (Mon–Fri)
      #   close    17:30 — weekdays only
      #
      # workflow_dispatch and repository_dispatch always run.
      - name: Resolve trigger label and time-window guard
        id: trigger
        env:
          GH_EVENT: ${{ github.event_name }}
          MANUAL_LABEL: ${{ github.event.inputs.trigger_label }}
          REPO_DISPATCH_LABEL: ${{ github.event.client_payload.label }}
        run: |
          set -euo pipefail
          NOW=$(TZ=Europe/Rome date +'%Y-%m-%d %H:%M %Z (%a)')
          DOW=$(TZ=Europe/Rome date +%u)        # 1=Mon … 7=Sun
          HOUR=$(TZ=Europe/Rome date +%H)
          MIN=$(TZ=Europe/Rome date +%M)
          # Convert HH:MM to absolute minutes since midnight for easy
          # comparison with each slot ± tolerance.
          NOW_MIN=$((10#$HOUR * 60 + 10#$MIN))
          TOL=20  # ± 20 minutes

          MORNING=$((9 * 60 + 5))    # 09:05
          MIDDAY=$((13 * 60))        # 13:00
          CLOSE=$((17 * 60 + 30))    # 17:30

          # Returns 0 (true) if NOW_MIN is within ±TOL of TARGET.
          in_window() {
            local target=$1
            local diff=$(( NOW_MIN > target ? NOW_MIN - target : target - NOW_MIN ))
            [[ $diff -le $TOL ]]
          }

          SLOT=""
          if in_window $MORNING; then
            SLOT="morning"
          elif in_window $MIDDAY; then
            SLOT="midday"
          elif in_window $CLOSE; then
            SLOT="close"
          fi

          # Weekend rule (Saturday=6, Sunday=7): only the morning slot
          # ships. Skip everything else.
          IS_WEEKEND=0
          if [[ "$DOW" -ge 6 ]]; then
            IS_WEEKEND=1
            if [[ "$SLOT" != "morning" ]]; then
              SLOT=""
            fi
          fi

          echo "Now: $NOW (DoW=$DOW, weekend=$IS_WEEKEND, slot=${SLOT:-NONE})"

          if [[ "$GH_EVENT" == "schedule" ]]; then
            if [[ -z "$SLOT" ]]; then
              SHOULD_RUN=0
              echo "Skipping: current local time is outside any configured slot."
            else
              SHOULD_RUN=1
            fi
            LABEL="${SLOT:-scheduled}"
          elif [[ "$GH_EVENT" == "repository_dispatch" ]]; then
            SHOULD_RUN=1
            LABEL="${REPO_DISPATCH_LABEL:-on-demand}"
          else
            SHOULD_RUN=1
            LABEL="${MANUAL_LABEL:-manual}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Will run? $SHOULD_RUN — label: $LABEL"

      - name: Set up Python
        if: steps.trigger.outputs.should_run == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.trigger.outputs.should_run == '1'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render & send newsletter
        if: steps.trigger.outputs.should_run == '1'
        env:
          TRIGGER_LABEL: ${{ steps.trigger.outputs.label }}
        run: python scripts/send_newsletter.py

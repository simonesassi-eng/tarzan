# Tarzan — portfolio newsletter automation
#
# SCHEDULING LIVES OUTSIDE THIS WORKFLOW.
#
# GitHub Actions' built-in `schedule:` cron is best-effort: it goes into
# backlog under load and then releases the queued runs in a burst, which
# is exactly what caused multiple newsletters to arrive back-to-back.
# It also can't express a local timezone, forcing a brittle winter/summer
# double-cron + DST guard.
#
# So this workflow no longer schedules itself. A punctual external
# scheduler — the Gmail Apps Script in scripts/apps_script/Code.gs,
# running on Google's reliable time-driven triggers in Europe/Rome —
# owns the *when*. It fires a `repository_dispatch` (event_type:
# send_now) at each market slot, carrying the slot name as the payload
# label. This workflow is now a pure *runner*: it executes whenever it
# is told to, by one of three triggers:
#
#   * repository_dispatch (send_now)  — scheduled slots (morning / midday
#       / close) AND on-demand "Update" replies, both from Apps Script.
#       The slot/label travels in client_payload.label.
#   * workflow_dispatch               — manual "Run workflow" button.
#
# The Apps Script scheduler is idempotent per (date, slot): each slot is
# dispatched at most once per day regardless of polling jitter or
# retries, so duplicates/bursts cannot reach this workflow. The
# concurrency group below is a second line of defence — it serializes
# runs so two dispatches arriving close together never overlap.

name: Tarzan Newsletter

on:
  workflow_dispatch:
    inputs:
      trigger_label:
        description: "Label for this run (shown in the email subject)"
        default: "manual"
        required: false
  repository_dispatch:
    types: [send_now]

# Serialize newsletter runs. If two dispatches land close together the
# second queues behind the first instead of running in parallel, so we
# never send two overlapping renders.
concurrency:
  group: tarzan-newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read

    env:
      # Email + SMTP — set these in repo Settings > Secrets and variables > Actions
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      # Inputs from Google Drive (preferred for public repos).
      # The service-account JSON must be the entire key, single-line,
      # with newlines escaped as \n.
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
      SUBJECT_PREFIX: "Tarzan Portfolio Digest"
      # Issue counter — increments every send via $GITHUB_RUN_NUMBER
      ISSUE_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Resolve a friendly slot label for the email subject. Scheduling
      # decisions (which slot, weekend rule, DST) are made upstream by
      # the Apps Script scheduler — this step only picks the label to
      # display, it never decides whether to run.
      #
      #   repository_dispatch → client_payload.label
      #       ("morning" / "midday" / "close" for scheduled slots,
      #        "on-demand" for an "Update" reply)
      #   workflow_dispatch   → the manual trigger_label input
      - name: Resolve trigger label
        id: trigger
        env:
          GH_EVENT: ${{ github.event_name }}
          MANUAL_LABEL: ${{ github.event.inputs.trigger_label }}
          REPO_DISPATCH_LABEL: ${{ github.event.client_payload.label }}
        run: |
          set -euo pipefail
          if [[ "$GH_EVENT" == "repository_dispatch" ]]; then
            LABEL="${REPO_DISPATCH_LABEL:-on-demand}"
          else
            LABEL="${MANUAL_LABEL:-manual}"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Event: $GH_EVENT — resolved label: $LABEL"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render & send newsletter
        env:
          TRIGGER_LABEL: ${{ steps.trigger.outputs.label }}
        run: python scripts/send_newsletter.py
